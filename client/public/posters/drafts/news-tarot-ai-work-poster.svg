<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">新聞塔羅提問：AI 工作變動</title>
  <desc id="desc">一張結合國際新聞知識與塔羅提問的 HealingPick 海報草稿。</desc>
  <defs>
    <linearGradient id="shade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF8" stop-opacity="0.82"/>
      <stop offset="42%" stop-color="#FFFDF8" stop-opacity="0.56"/>
      <stop offset="100%" stop-color="#26302F" stop-opacity="0.64"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#26302F" flood-opacity="0.18"/>
    </filter>
  </defs>

  <image href="news-tarot-ai-work-bg.png" x="0" y="0" width="1080" height="1350" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1080" height="1350" fill="url(#shade)"/>

  <text x="80" y="104" fill="#8A7250" font-size="22" letter-spacing="6" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">HEALINGPICK 癒見好物</text>
  <text x="80" y="176" fill="#26302F" font-size="64" letter-spacing="4" font-weight="300" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">新聞塔羅提問</text>
  <text x="80" y="224" fill="#5F6D68" font-size="22" letter-spacing="4" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">NEWS × TAROT PROMPT</text>

  <g filter="url(#softShadow)">
    <rect x="72" y="320" width="736" height="286" rx="34" fill="#FFFDF8" opacity="0.78"/>
  </g>
  <text x="112" y="374" fill="#8A7250" font-size="24" letter-spacing="5" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">今天的國際新聞</text>
  <text x="112" y="432" fill="#26302F" font-size="34" font-weight="500" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">AI 正在改變工作的位置</text>
  <text x="112" y="486" fill="#38413F" font-size="25" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">近期多家科技公司裁員，並把資源轉向 AI。</text>
  <text x="112" y="526" fill="#38413F" font-size="25" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">這不只是一則企業新聞，也代表工作能力</text>
  <text x="112" y="566" fill="#38413F" font-size="25" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">正在重新被定義。</text>

  <g filter="url(#softShadow)">
    <rect x="72" y="668" width="782" height="212" rx="34" fill="#26302F" opacity="0.86"/>
  </g>
  <text x="112" y="724" fill="#E8D6B3" font-size="24" letter-spacing="5" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">為什麼跟我們有關？</text>
  <text x="112" y="780" fill="#FFFDF8" font-size="27" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">因為它碰到的不是科技問題而已，</text>
  <text x="112" y="824" fill="#FFFDF8" font-size="27" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">而是很多人心裡的安全感：</text>
  <text x="112" y="868" fill="#FFFDF8" font-size="27" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">「我還有不可取代的價值嗎？」</text>

  <g transform="translate(72 974)">
    <text x="0" y="0" fill="#8A7250" font-size="24" letter-spacing="5" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">你可以問塔羅</text>
    <rect x="0" y="38" width="792" height="72" rx="36" fill="#FFFDF8" opacity="0.84"/>
    <text x="396" y="84" text-anchor="middle" fill="#26302F" font-size="28" font-weight="500" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">我現在最該培養哪種能力？</text>
    <rect x="0" y="128" width="792" height="64" rx="32" fill="#FFFDF8" opacity="0.62"/>
    <text x="396" y="169" text-anchor="middle" fill="#38413F" font-size="24" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">我對未來工作的焦慮，真正來自哪裡？</text>
    <rect x="0" y="210" width="792" height="64" rx="32" fill="#FFFDF8" opacity="0.62"/>
    <text x="396" y="251" text-anchor="middle" fill="#38413F" font-size="24" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">我接下來該穩住，還是該轉向？</text>
  </g>

  <text x="80" y="1290" fill="#FFFDF8" font-size="20" letter-spacing="2" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">看懂世界，也把不安整理成一個可以問的問題。</text>
</svg>
