<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">AI 正在改變工作，你也開始懷疑自己的位置嗎？</title>
  <desc id="desc">HealingPick 的新聞塔羅提問海報草稿第二版。</desc>
  <defs>
    <linearGradient id="veil" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FFFDF8" stop-opacity="0.92"/>
      <stop offset="45%" stop-color="#FFFDF8" stop-opacity="0.58"/>
      <stop offset="76%" stop-color="#F4EFE6" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#26302F" stop-opacity="0.52"/>
    </linearGradient>
    <linearGradient id="question" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2F3A38"/>
      <stop offset="100%" stop-color="#6E7F79"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#26302F" flood-opacity="0.18"/>
    </filter>
  </defs>

  <image href="news-tarot-ai-work-bg.png" x="0" y="0" width="1080" height="1350" preserveAspectRatio="xMidYMid slice"/>
  <rect width="1080" height="1350" fill="url(#veil)"/>

  <text x="86" y="116" fill="#8A7250" font-size="20" letter-spacing="4" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">HEALINGPICK WORLD NOTE</text>
  <line x1="86" y1="148" x2="266" y2="148" stroke="#8A7250" stroke-width="1.5" stroke-opacity="0.5"/>

  <text x="86" y="260" fill="#26302F" font-size="72" font-weight="500" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">AI 正在改變工作，</text>
  <text x="86" y="348" fill="#26302F" font-size="72" font-weight="500" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">你也開始懷疑</text>
  <text x="86" y="436" fill="#26302F" font-size="72" font-weight="500" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">自己的位置嗎？</text>

  <text x="90" y="548" fill="#5C6B67" font-size="27" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">近期多家科技公司裁員，並把資源轉向 AI。</text>
  <text x="90" y="592" fill="#5C6B67" font-size="27" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">這不只是企業新聞，也代表工作能力正在被重新定義。</text>

  <g transform="translate(86 690)">
    <text x="0" y="0" fill="#8A7250" font-size="24" letter-spacing="3" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">這則新聞觸碰的安全感</text>
    <text x="0" y="68" fill="#26302F" font-size="42" font-weight="500" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">「我還有不可取代的價值嗎？」</text>
  </g>

  <g transform="translate(86 914)" filter="url(#softShadow)">
    <rect x="0" y="0" width="820" height="180" rx="38" fill="url(#question)"/>
    <text x="54" y="58" fill="#E8D6B3" font-size="22" letter-spacing="4" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">可以問塔羅</text>
    <text x="54" y="124" fill="#FFFDF8" font-size="38" font-weight="500" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">我現在最該培養哪種能力？</text>
  </g>

  <text x="86" y="1208" fill="#FFFDF8" font-size="24" font-weight="500" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">看懂世界，也把不安整理成一個可以問的問題。</text>
  <text x="86" y="1252" fill="#F4EFE6" font-size="17" letter-spacing="2" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">資料脈絡：近期科技業裁員與 AI 轉型報導整理</text>
</svg>
