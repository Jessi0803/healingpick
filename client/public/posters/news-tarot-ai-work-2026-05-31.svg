<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">新聞塔羅提問：AI 工作變動下的不安</title>
  <desc id="desc">HealingPick 癒見好物的新聞結合塔羅提問海報，主題為全球裁員與 AI 工作變動。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F6EFE3"/>
      <stop offset="42%" stop-color="#E7ECE8"/>
      <stop offset="100%" stop-color="#D6DFE8"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFFDF8" stop-opacity="0.94"/>
      <stop offset="100%" stop-color="#F1F5F2" stop-opacity="0.88"/>
    </linearGradient>
    <linearGradient id="tarot" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#33413E"/>
      <stop offset="100%" stop-color="#8A7250"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="43%" r="48%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.86"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="30" flood-color="#26302F" flood-opacity="0.16"/>
    </filter>
    <pattern id="dots" width="96" height="96" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="20" r="1" fill="#8A7250" opacity="0.16"/>
      <circle cx="70" cy="42" r="0.8" fill="#536B75" opacity="0.13"/>
      <circle cx="42" cy="78" r="1.1" fill="#8A7250" opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="1080" height="1350" fill="url(#bg)"/>
  <rect width="1080" height="1350" fill="url(#dots)" opacity="0.72"/>
  <circle cx="160" cy="210" r="210" fill="#FFFFFF" opacity="0.26"/>
  <circle cx="925" cy="1120" r="260" fill="#8CA7A0" opacity="0.18"/>
  <circle cx="880" cy="220" r="170" fill="#C8AD7D" opacity="0.18"/>

  <g opacity="0.32">
    <circle cx="540" cy="424" r="302" fill="none" stroke="#8A7250" stroke-width="1.2" stroke-dasharray="6 16"/>
    <circle cx="540" cy="424" r="220" fill="none" stroke="#536B75" stroke-width="0.9"/>
    <path d="M342 424 H738 M540 226 V622" stroke="#536B75" stroke-width="0.8"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="78" y="72" width="924" height="1206" rx="44" fill="url(#card)"/>
    <rect x="103" y="97" width="874" height="1156" rx="34" fill="none" stroke="#C8AD7D" stroke-opacity="0.45" stroke-width="1.5"/>
  </g>

  <text x="540" y="150" text-anchor="middle" fill="#8A7250" font-size="22" letter-spacing="8" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">HEALINGPICK 癒見好物</text>
  <text x="540" y="204" text-anchor="middle" fill="#2F3A38" font-size="58" letter-spacing="6" font-weight="300" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">新聞塔羅提問</text>
  <text x="540" y="250" text-anchor="middle" fill="#6D7E7A" font-size="21" letter-spacing="4" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">NEWS × TAROT PROMPT</text>

  <g transform="translate(334 312)">
    <circle cx="206" cy="150" r="148" fill="url(#halo)"/>
    <rect x="86" y="20" width="240" height="320" rx="28" fill="url(#tarot)" filter="url(#shadow)"/>
    <rect x="110" y="44" width="192" height="272" rx="18" fill="none" stroke="#F7F0E4" stroke-opacity="0.55" stroke-width="1.4"/>
    <circle cx="206" cy="170" r="58" fill="#F7F0E4" opacity="0.85"/>
    <text x="206" y="188" text-anchor="middle" fill="#33413E" font-size="62" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">?</text>
    <text x="206" y="98" text-anchor="middle" fill="#F7F0E4" font-size="28" letter-spacing="5" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">AI</text>
    <text x="206" y="270" text-anchor="middle" fill="#F7F0E4" font-size="24" letter-spacing="5" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">WORK</text>
  </g>

  <text x="540" y="710" text-anchor="middle" fill="#2F3A38" font-size="38" letter-spacing="3" font-weight="500" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">這則新聞讓你想到工作不安嗎？</text>
  <text x="540" y="758" text-anchor="middle" fill="#5F6D68" font-size="23" letter-spacing="1" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">全球裁員與 AI 工作變動，正在讓很多人重新思考自己的位置。</text>

  <g transform="translate(150 825)">
    <rect x="0" y="0" width="780" height="142" rx="26" fill="#F6EFE3" opacity="0.88" stroke="#C8AD7D" stroke-opacity="0.3"/>
    <text x="38" y="48" fill="#8A7250" font-size="22" letter-spacing="4" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">先白話看懂</text>
    <text x="38" y="88" fill="#2F3A38" font-size="24" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">AI 不只是取代工作，也在改變「什麼能力被需要」。</text>
    <text x="38" y="122" fill="#5F6D68" font-size="20" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">焦慮的核心，常常不是科技本身，而是：我還有價值嗎？</text>
  </g>

  <g transform="translate(150 1022)">
    <text x="0" y="0" fill="#8A7250" font-size="22" letter-spacing="4" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">你可以問塔羅</text>
    <g transform="translate(0 34)">
      <rect x="0" y="0" width="780" height="58" rx="29" fill="#2F3A38"/>
      <text x="390" y="38" text-anchor="middle" fill="#FFFDF8" font-size="23" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">我現在最該培養哪種能力？</text>
    </g>
    <g transform="translate(0 108)">
      <rect x="0" y="0" width="780" height="58" rx="29" fill="#FFFFFF" opacity="0.72" stroke="#C8AD7D" stroke-opacity="0.36"/>
      <text x="390" y="38" text-anchor="middle" fill="#2F3A38" font-size="22" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">我對未來工作的焦慮，真正來自哪裡？</text>
    </g>
    <g transform="translate(0 182)">
      <rect x="0" y="0" width="780" height="58" rx="29" fill="#FFFFFF" opacity="0.72" stroke="#C8AD7D" stroke-opacity="0.36"/>
      <text x="390" y="38" text-anchor="middle" fill="#2F3A38" font-size="22" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">我接下來該穩住，還是該轉向？</text>
    </g>
  </g>

  <text x="540" y="1290" text-anchor="middle" fill="#8A7250" font-size="17" letter-spacing="2" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">看懂世界，也把不安整理成一個可以問的問題。</text>
</svg>
