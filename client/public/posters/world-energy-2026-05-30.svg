<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1350" role="img" aria-labelledby="title desc">
  <title id="title">世界能量天氣：當世界升溫，先把自己安住</title>
  <desc id="desc">HealingPick 癒見好物的國際新聞療癒海報，整理 2026 年 5 月 30 日國際新聞下的情緒提醒。</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F7F0E4"/>
      <stop offset="46%" stop-color="#E9EEF0"/>
      <stop offset="100%" stop-color="#D8E2DC"/>
    </linearGradient>
    <linearGradient id="sunset" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#D39C73" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#8CA7A0" stop-opacity="0.78"/>
    </linearGradient>
    <radialGradient id="moonGlow" cx="50%" cy="45%" r="48%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.82"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="28" flood-color="#38413F" flood-opacity="0.16"/>
    </filter>
    <pattern id="grain" width="120" height="120" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="18" r="1.1" fill="#6F7E78" opacity="0.12"/>
      <circle cx="82" cy="34" r="0.9" fill="#B58A68" opacity="0.16"/>
      <circle cx="48" cy="94" r="1" fill="#6F7E78" opacity="0.10"/>
      <circle cx="108" cy="86" r="0.7" fill="#B58A68" opacity="0.12"/>
    </pattern>
  </defs>

  <rect width="1080" height="1350" fill="url(#paper)"/>
  <rect width="1080" height="1350" fill="url(#grain)" opacity="0.78"/>

  <circle cx="195" cy="165" r="190" fill="#FFFFFF" opacity="0.28"/>
  <circle cx="928" cy="1175" r="250" fill="#C9B08D" opacity="0.20"/>
  <circle cx="845" cy="230" r="150" fill="#8CA7A0" opacity="0.18"/>

  <g opacity="0.34">
    <circle cx="540" cy="552" r="315" fill="none" stroke="#8A7250" stroke-width="1.2" stroke-dasharray="5 14"/>
    <circle cx="540" cy="552" r="235" fill="none" stroke="#73847E" stroke-width="0.9"/>
    <line x1="540" y1="232" x2="540" y2="872" stroke="#73847E" stroke-width="0.8"/>
    <line x1="220" y1="552" x2="860" y2="552" stroke="#73847E" stroke-width="0.8"/>
  </g>

  <g filter="url(#softShadow)">
    <rect x="86" y="78" width="908" height="1194" rx="42" fill="#FFFDF8" opacity="0.72"/>
    <rect x="107" y="99" width="866" height="1152" rx="32" fill="none" stroke="#C8AD7D" stroke-opacity="0.42" stroke-width="1.4"/>
  </g>

  <text x="540" y="166" text-anchor="middle" fill="#8A7250" font-size="23" letter-spacing="8" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">HEALINGPICK 癒見好物</text>
  <text x="540" y="215" text-anchor="middle" fill="#38413F" font-size="60" letter-spacing="7" font-weight="300" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">世界能量天氣</text>
  <text x="540" y="263" text-anchor="middle" fill="#6F7E78" font-size="22" letter-spacing="5" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">2026.05.30 · WORLD EMOTIONAL BRIEF</text>

  <g transform="translate(218 335)">
    <circle cx="322" cy="128" r="126" fill="url(#moonGlow)"/>
    <circle cx="322" cy="128" r="94" fill="url(#sunset)" opacity="0.86"/>
    <path d="M160 184 C238 142 296 218 380 176 C452 140 500 164 586 118" fill="none" stroke="#FFFFFF" stroke-opacity="0.62" stroke-width="14" stroke-linecap="round"/>
    <text x="322" y="140" text-anchor="middle" fill="#FFFDF8" font-size="72" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">安</text>
  </g>

  <text x="540" y="620" text-anchor="middle" fill="#38413F" font-size="40" letter-spacing="4" font-weight="500" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">當世界升溫，先把自己安住</text>
  <text x="540" y="670" text-anchor="middle" fill="#5F6D68" font-size="24" letter-spacing="2" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">不是所有緊張，都要由你今天一次消化完。</text>

  <g transform="translate(165 735)">
    <rect x="0" y="0" width="750" height="154" rx="24" fill="#F7F0E4" opacity="0.86" stroke="#C8AD7D" stroke-opacity="0.28"/>
    <text x="38" y="50" fill="#8A7250" font-size="22" letter-spacing="4" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">今天的三個世界訊號</text>
    <text x="38" y="92" fill="#38413F" font-size="24" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">法國熱浪警戒 · 亞太安全峰會 · 荷姆茲海峽能源談判</text>
    <text x="38" y="128" fill="#6F7E78" font-size="19" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">它們共同指向一種感受：安全感正在被環境拉扯。</text>
  </g>

  <g transform="translate(165 945)">
    <text x="0" y="0" fill="#8A7250" font-size="22" letter-spacing="4" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">MOCHI 的溫柔翻譯</text>
    <text x="0" y="48" fill="#38413F" font-size="27" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">你可以關心世界，但不用把世界全部背在身上。</text>
    <text x="0" y="92" fill="#38413F" font-size="27" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">今天先把注意力收回一件你能控制的小事。</text>
  </g>

  <g transform="translate(165 1102)">
    <rect x="0" y="0" width="750" height="92" rx="46" fill="#38413F"/>
    <text x="375" y="38" text-anchor="middle" fill="#FFFDF8" font-size="20" letter-spacing="4" font-family="'Noto Serif TC','PingFang TC','Microsoft JhengHei',serif">今日療癒行動</text>
    <text x="375" y="68" text-anchor="middle" fill="#F7F0E4" font-size="22" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">關掉新聞 15 分鐘，寫下「我現在能做的一件事」。</text>
  </g>

  <text x="540" y="1248" text-anchor="middle" fill="#8A7250" font-size="16" letter-spacing="2" font-family="'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif">資料脈絡：Reuters / AP 國際新聞摘要 · HealingPick 情緒整理</text>
</svg>
